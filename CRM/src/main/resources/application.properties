# ==========================================
# Configuración de la base de datos H2
# ==========================================

# URL de conexión: mem = en memoria, crm = nombre de la BD
spring.datasource.url=jdbc:h2:mem:crm;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Consola web H2: accesible en http://localhost:8080/h2-console
# Útil para inspeccionar tablas durante el desarrollo
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==========================================
# Configuración de JPA / Hibernate
# ==========================================

# create-drop: crea las tablas al arrancar y las elimina al apagar.
# Para producción cambiar a 'validate' o 'none'.
spring.jpa.hibernate.ddl-auto=create-drop

# Dialecto H2 para que Hibernate genere SQL compatible
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Muestra el SQL generado en consola (útil para depuración)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# Configuración JWT
# ==========================================

# Clave secreta para firmar los tokens (en producción usar variable de entorno)
jwt.secret=clave-secreta-super-segura-para-firmar-tokens-jwt-crm-2024
# Expiración del token: 86400000 ms = 24 horas
jwt.expiration=86400000

# ==========================================
# Configuración general
# ==========================================
spring.application.name=crm
server.port=8080